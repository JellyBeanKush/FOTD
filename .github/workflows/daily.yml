name: Fact Bot

on:
  schedule:
    - cron: '45 14 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install @google/generative-ai@0.21.0 node-fetch

      - name: Run Fact Script
        run: node index.mjs
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

      - name: Commit and Push Changes
        run: |
          git config --global user.name "Fact Bot"
          git config --global user.email "bot@github.com"
          git add current_fact.txt used_facts.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update Daily Fact [skip ci]" && git push)
